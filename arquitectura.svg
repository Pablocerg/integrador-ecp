<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 780" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 8 3 0 6Z" fill="#64748b"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 8 3 0 6Z" fill="#059669"/>
    </marker>
    <filter id="s" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <filter id="ss" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Fondo general -->
  <rect width="1140" height="780" fill="#f1f5f9"/>

  <!-- Título principal -->
  <text x="570" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" letter-spacing="0.5">Pizzería KONE — Diagrama de Arquitectura</text>
  <line x1="200" y1="48" x2="940" y2="48" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- BARRA DE FLUJO SUPERIOR -->
  <!-- ============================================================ -->

  <!-- Browser -->
  <rect x="50" y="66" width="74" height="28" rx="14" fill="#334155"/>
  <text x="87" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Browser</text>
  <line x1="124" y1="80" x2="154" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- React -->
  <rect x="158" y="66" width="152" height="28" rx="14" fill="#2563eb"/>
  <text x="234" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">React App (Vite :5173)</text>
  <line x1="310" y1="80" x2="340" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- HTTP -->
  <rect x="344" y="66" width="90" height="28" rx="14" fill="#64748b"/>
  <text x="389" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">HTTP /api/*</text>
  <line x1="434" y1="80" x2="464" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Express -->
  <rect x="468" y="66" width="120" height="28" rx="14" fill="#d97706"/>
  <text x="528" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Express (:5000)</text>
  <line x1="588" y1="80" x2="618" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MongoDB -->
  <rect x="622" y="66" width="116" height="28" rx="14" fill="#059669"/>
  <text x="680" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">MongoDB Atlas</text>

  <!-- ============================================================ -->
  <!-- PANEL IZQUIERDO — FRONTEND -->
  <!-- ============================================================ -->

  <rect x="30" y="115" width="640" height="410" rx="10" fill="#fff" filter="url(#s)" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="115" width="640" height="44" rx="10" fill="#eff6ff"/>
  <rect x="30" y="149" width="640" height="10" rx="0" fill="#eff6ff"/>

  <text x="350" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">Frontend</text>
  <text x="350" y="151" text-anchor="middle" font-size="10" fill="#64748b">React 19 · Vite 8 · React Router v7 · Tailwind CSS v4</text>

  <!-- Jerarquía de componentes -->
  <rect x="55" y="175" width="590" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="350" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">App.jsx</text>
  <line x1="350" y1="203" x2="350" y2="213" stroke="#93c5fd" stroke-width="1" marker-end="url(#a)"/>

  <rect x="55" y="215" width="590" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="350" y="233" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">CartProvider (Context API + localStorage)</text>
  <line x1="350" y1="243" x2="350" y2="253" stroke="#93c5fd" stroke-width="1" marker-end="url(#a)"/>

  <rect x="55" y="255" width="590" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="350" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">BrowserRouter v7</text>

  <!-- Tabla de rutas -->
  <line x1="55" y1="295" x2="645" y2="295" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="308" font-size="10" font-weight="700" fill="#64748b">RUTA</text>
  <text x="240" y="308" font-size="10" font-weight="700" fill="#64748b">COMPONENTE</text>
  <text x="460" y="308" font-size="10" font-weight="700" fill="#64748b">DEPENDENCIA</text>
  <line x1="55" y1="313" x2="645" y2="313" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Data rows -->
  <g font-size="11" fill="#334155">
    <!-- 1 -->
    <rect x="55" y="315" width="590" height="24" fill="#f8fafc"/>
    <text x="70" y="331" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/</text>
    <text x="240" y="331">LandingPage</text>
    <text x="460" y="331" font-size="9" fill="#94a3b8">—</text>
    <!-- 2 -->
    <rect x="55" y="339" width="590" height="24" fill="#fff"/>
    <text x="70" y="355" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/producto/:id</text>
    <text x="240" y="355">ProductDetail</text>
    <text x="460" y="355" font-size="9" fill="#94a3b8">—</text>
    <!-- 3 -->
    <rect x="55" y="363" width="590" height="24" fill="#fef2f2"/>
    <text x="70" y="379" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/cart</text>
    <text x="240" y="379">CartPage</text>
    <rect x="455" y="371" width="76" height="14" rx="3" fill="#fecaca"/>
    <text x="493" y="381" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">CartContext</text>
    <!-- 4 -->
    <rect x="55" y="387" width="590" height="24" fill="#fef2f2"/>
    <text x="70" y="403" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/checkout</text>
    <text x="240" y="403">CheckoutPage</text>
    <rect x="455" y="395" width="76" height="14" rx="3" fill="#fecaca"/>
    <text x="493" y="405" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">CartContext</text>
    <!-- 5 -->
    <rect x="55" y="411" width="590" height="24" fill="#f8fafc"/>
    <text x="70" y="427" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/login</text>
    <text x="240" y="427">LoginPage</text>
    <text x="460" y="427" font-size="9" fill="#94a3b8">—</text>
    <!-- 6 -->
    <rect x="55" y="435" width="590" height="24" fill="#fff"/>
    <text x="70" y="451" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/register</text>
    <text x="240" y="451">RegisterPage</text>
    <text x="460" y="451" font-size="9" fill="#94a3b8">—</text>
    <!-- 7 -->
    <rect x="55" y="459" width="590" height="24" fill="#f8fafc"/>
    <text x="70" y="475" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/orders</text>
    <text x="240" y="475">OrdersPage</text>
    <rect x="455" y="467" width="42" height="14" rx="3" fill="#fef3c7"/>
    <text x="476" y="477" text-anchor="middle" font-size="8" font-weight="600" fill="#d97706">auth</text>
    <!-- 8 -->
    <rect x="55" y="483" width="590" height="24" fill="#fff"/>
    <text x="70" y="499" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/profile</text>
    <text x="240" y="499">ProfilePage</text>
    <rect x="455" y="491" width="42" height="14" rx="3" fill="#fef3c7"/>
    <text x="476" y="501" text-anchor="middle" font-size="8" font-weight="600" fill="#d97706">auth</text>
    <!-- 9 -->
    <rect x="55" y="507" width="590" height="24" fill="#f8fafc"/>
    <text x="70" y="523" font-family="'Courier New', monospace" font-size="10" fill="#2563eb">/admin</text>
    <text x="240" y="523">AdminPanel</text>
    <rect x="455" y="515" width="66" height="14" rx="3" fill="#fef3c7"/>
    <text x="488" y="525" text-anchor="middle" font-size="8" font-weight="600" fill="#d97706">auth+admin</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL DERECHO — BACKEND API -->
  <!-- ============================================================ -->

  <rect x="690" y="115" width="420" height="410" rx="10" fill="#fff" filter="url(#s)" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="690" y="115" width="420" height="44" rx="10" fill="#fffbeb"/>
  <rect x="690" y="149" width="420" height="10" rx="0" fill="#fffbeb"/>

  <text x="900" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">Backend API</text>
  <text x="900" y="151" text-anchor="middle" font-size="10" fill="#64748b">Node.js · Express · Mongoose</text>

  <!-- Endpoints -->
  <g font-size="11" fill="#334155">
    <!-- Products -->
    <text x="710" y="178" font-size="10" font-weight="700" fill="#64748b">Productos</text>
    <rect x="710" y="186" width="380" height="24" rx="4" fill="#f8fafc"/>
    <rect x="715" y="189" width="30" height="16" rx="3" fill="#dbeafe"/>
    <text x="730" y="201" text-anchor="middle" font-size="8" font-weight="700" fill="#2563eb">GET</text>
    <text x="755" y="202" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/products</text>
    <text x="950" y="202" text-anchor="end" font-size="10" fill="#64748b">productController.getAll</text>

    <rect x="710" y="214" width="380" height="24" rx="4" fill="#fff"/>
    <rect x="715" y="217" width="30" height="16" rx="3" fill="#dbeafe"/>
    <text x="730" y="229" text-anchor="middle" font-size="8" font-weight="700" fill="#2563eb">GET</text>
    <text x="755" y="230" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/products/:id</text>
    <text x="950" y="230" text-anchor="end" font-size="10" fill="#64748b">productController.getById</text>

    <!-- Orders -->
    <text x="710" y="250" font-size="10" font-weight="700" fill="#64748b">Órdenes</text>
    <rect x="710" y="258" width="380" height="24" rx="4" fill="#f8fafc"/>
    <rect x="715" y="261" width="30" height="16" rx="3" fill="#d1fae5"/>
    <text x="730" y="273" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">POST</text>
    <text x="755" y="274" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/orders</text>
    <text x="950" y="274" text-anchor="end" font-size="10" fill="#64748b">orderController.create</text>

    <rect x="710" y="286" width="380" height="24" rx="4" fill="#fff"/>
    <rect x="715" y="289" width="30" height="16" rx="3" fill="#dbeafe"/>
    <text x="730" y="301" text-anchor="middle" font-size="8" font-weight="700" fill="#2563eb">GET</text>
    <text x="755" y="302" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/orders/mis-pedidos</text>
    <text x="950" y="302" text-anchor="end" font-size="10" fill="#64748b">orderController.getByUser</text>

    <!-- Users -->
    <text x="710" y="322" font-size="10" font-weight="700" fill="#64748b">Usuarios</text>
    <rect x="710" y="330" width="380" height="24" rx="4" fill="#f8fafc"/>
    <rect x="715" y="333" width="30" height="16" rx="3" fill="#d1fae5"/>
    <text x="730" y="345" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">POST</text>
    <text x="755" y="346" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/users/login</text>
    <text x="950" y="346" text-anchor="end" font-size="10" fill="#64748b">userController.login</text>

    <rect x="710" y="358" width="380" height="24" rx="4" fill="#fff"/>
    <rect x="715" y="361" width="30" height="16" rx="3" fill="#d1fae5"/>
    <text x="730" y="373" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">POST</text>
    <text x="755" y="374" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/users/register</text>
    <text x="950" y="374" text-anchor="end" font-size="10" fill="#64748b">userController.register</text>

    <rect x="710" y="386" width="380" height="24" rx="4" fill="#f8fafc"/>
    <rect x="715" y="389" width="30" height="16" rx="3" fill="#d1fae5"/>
    <text x="730" y="401" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">POST</text>
    <text x="755" y="402" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/users/contact</text>
    <text x="950" y="402" text-anchor="end" font-size="10" fill="#64748b">userController.contact</text>

    <rect x="710" y="414" width="380" height="24" rx="4" fill="#fff"/>
    <rect x="715" y="417" width="30" height="16" rx="3" fill="#d1fae5"/>
    <text x="730" y="429" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">POST</text>
    <text x="755" y="430" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/users/forgot-password</text>
    <text x="950" y="430" text-anchor="end" font-size="10" fill="#64748b">userController.forgotPassword</text>

    <rect x="710" y="442" width="380" height="24" rx="4" fill="#f8fafc"/>
    <rect x="715" y="445" width="30" height="16" rx="3" fill="#d1fae5"/>
    <text x="730" y="457" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">POST</text>
    <text x="755" y="458" font-family="'Courier New', monospace" font-size="10" fill="#334155">/api/users/reset-password/:token</text>
    <text x="950" y="458" text-anchor="end" font-size="10" fill="#64748b">userController.resetPassword</text>
  </g>

  <!-- Middleware bar -->
  <rect x="710" y="478" width="380" height="28" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="900" y="496" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Middleware: authMiddleware (JWT)  ·  isAdmin (role)  ·  bcrypt</text>

  <!-- ============================================================ -->
  <!-- PANEL INFERIOR — BASE DE DATOS -->
  <!-- ============================================================ -->

  <rect x="30" y="545" width="1080" height="210" rx="10" fill="#fff" filter="url(#s)" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="545" width="1080" height="44" rx="10" fill="#ecfdf5"/>
  <rect x="30" y="579" width="1080" height="10" rx="0" fill="#ecfdf5"/>

  <text x="570" y="565" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">Base de Datos</text>
  <text x="570" y="581" text-anchor="middle" font-size="10" fill="#64748b">MongoDB Atlas · Mongoose ODM</text>

  <!-- Modelo User -->
  <rect x="100" y="605" width="240" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="100" y="605" width="240" height="28" rx="8" fill="#dcfce7"/>
  <rect x="100" y="625" width="240" height="8" rx="0" fill="#dcfce7"/>
  <text x="220" y="624" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">User</text>
  <text x="120" y="650" font-size="9" fill="#475569">email, password, nombre, rol</text>
  <text x="120" y="664" font-size="9" fill="#475569">activo (borrado lógico)</text>
  <text x="120" y="678" font-size="8" fill="#94a3b8">Collection: users</text>

  <!-- Modelo Order -->
  <rect x="450" y="605" width="240" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="450" y="605" width="240" height="28" rx="8" fill="#dcfce7"/>
  <rect x="450" y="625" width="240" height="8" rx="0" fill="#dcfce7"/>
  <text x="570" y="624" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Order</text>
  <text x="470" y="650" font-size="9" fill="#475569">usuario (ref User), items[]</text>
  <text x="470" y="664" font-size="9" fill="#475569">total, estado</text>
  <text x="470" y="678" font-size="8" fill="#94a3b8">Collection: orders</text>

  <!-- Modelo Product -->
  <rect x="800" y="605" width="240" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="800" y="605" width="240" height="28" rx="8" fill="#dcfce7"/>
  <rect x="800" y="625" width="240" height="8" rx="0" fill="#dcfce7"/>
  <text x="920" y="624" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Product</text>
  <text x="820" y="650" font-size="9" fill="#475569">nombre, descripcion, precio, stock</text>
  <text x="820" y="664" font-size="9" fill="#475569">categoria, imagen, activo</text>
  <text x="820" y="678" font-size="8" fill="#94a3b8">Collection: products</text>

  <!-- Relaciones -->
  <!-- User → Order -->
  <line x1="340" y1="625" x2="400" y2="625" stroke="#059669" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="400" y1="625" x2="450" y2="625" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>
  <text x="370" y="618" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">1</text>
  <text x="430" y="618" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">N</text>

  <!-- Order → Product -->
  <line x1="690" y1="625" x2="750" y2="625" stroke="#059669" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="750" y1="625" x2="800" y2="625" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>
  <text x="720" y="618" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">N</text>
  <text x="780" y="618" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">M</text>

  <!-- Nota -->
  <text x="570" y="738" text-anchor="middle" font-size="10" fill="#94a3b8">Nota: Order → Product es relación N:M a través del array items[{ productId, cantidad, precio }]. No hay modelo Cart en BD — el carrito vive en localStorage.</text>

</svg>